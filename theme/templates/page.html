{% extends "base.html" %}

{% block title %}{{ page.title }} | {{ SITENAME }}{% endblock %}

{% block content %}
<section class="py-12 lg:py-20 bg-base-100" aria-labelledby="page-heading">
    <div class="container mx-auto px-4 max-w-4xl">
        <h1 id="page-heading" class="text-3xl lg:text-4xl font-bold mb-8">{{ page.title }}</h1>
        <div class="prose prose-lg max-w-none">
            {{ page.content }}
        </div>
    </div>
</section>
{% endblock %}
